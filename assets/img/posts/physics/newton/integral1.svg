<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <pattern id="diagonalHatch" patternUnits="userSpaceOnUse" width="4" height="4">
      <path d="M-1,1 l2,-2 M0,4 l4,-4 M3,5 l2,-2" style="stroke:#000000; stroke-width:0.5" />
    </pattern>
  </defs>

  <!-- White background -->
  <rect width="400" height="300" fill="white"/>
  
  <!-- Limites -->
  <line x1="370" y1="250" x2="370" y2="30" stroke="silver" stroke-width="2" stroke-dasharray="4"/>

  <!-- Eixos -->
  <line x1="50" y1="250" x2="390" y2="250" stroke="black" stroke-width="2"/>
  <line x1="50" y1="250" x2="50" y2="30" stroke="black" stroke-width="2"/>
  
  <!-- Rótulos dos eixos -->
  <text x="375" y="270" font-family="Arial" font-size="14" text-anchor="end">t (Tempo)</text>
  <text x="60" y="5" font-family="Arial" text-anchor="end" transform="rotate(-90, 65, 25)" font-size="14">Velocidade</text>
  
  <!-- Linha de velocidade constante -->
  <line x1="50" y1="100" x2="370" y2="100" stroke="blue" stroke-width="2"/>
  
  <!-- Área sombreada -->
  <rect x="50" y="100" width="320" height="150" fill="url(#diagonalHatch)" opacity="0.3"/>
  
  <!-- Rótulo da área -->
  <text x="210" y="200" font-family="Arial" font-size="14" text-anchor="middle">Variação na Posição</text>
</svg>