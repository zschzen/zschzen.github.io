<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- White background -->
  <rect width="400" height="300" fill="white"/>

  <!-- Limites -->
  <line x1="370" y1="250" x2="370" y2="30" stroke="silver" stroke-width="2" stroke-dasharray="4"/>

  <!-- Eixos -->
  <line x1="70" y1="250" x2="390" y2="250" stroke="black" stroke-width="2"/>
  <line x1="70" y1="250" x2="70" y2="20" stroke="black" stroke-width="2"/>
  
  <!-- Rótulos dos eixos -->
  <text x="375" y="270" font-family="Arial" font-size="14" text-anchor="end">t (Tempo)</text>
  <text x="65" y="25" font-family="Arial" font-size="14" text-anchor="end" transform="rotate(-90, 65, 25)">Posição (∫ Velocidade × Tempo)</text>
  
  <!-- Linha de posição (integral da velocidade) -->
  <line x1="70" y1="250" x2="390" y2="50" stroke="red" stroke-width="2"/>
  
  <!-- Rótulo do gráfico -->
  <text x="225" y="290" font-family="Arial" font-size="16" text-anchor="middle" fill="red">Posição ao longo do Tempo</text>
</svg>
