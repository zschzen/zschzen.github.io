    ansis: ^4.3.1
    cross-env: ^10.1.0
    degit: ^3.3.2
    diacritics: ^1.3.0
    eslint: ^10.4.1
    eslint-plugin-format: ^2.0.1
    exifreader: ^4.40.5
    fast-glob: ^3.3.3
